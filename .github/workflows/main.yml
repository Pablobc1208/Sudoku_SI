name: CI/CD Pipeline Maven - GitFlow

on:
  # Se ejecuta en cada push a la rama de desarrollo para verificar la integración
  push:
    branches: ["dev", "develop"]
  # Se ejecuta al crear un Pull Request hacia main
  pull_request:
    branches: ["main"]

# Permisos necesarios para desplegar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    name: Compilación, Pruebas y Cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código (Checkout)
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Compilar y ejecutar pruebas unitarias (con JaCoCo para cobertura)
        working-directory: ./demo
        run: mvn clean test jacoco:report

      - name: Subir reporte de cobertura como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: reporte-cobertura-jacoco
          path: target/site/jacoco/
          retention-days: 7

  generate-and-deploy-javadoc:
    name: Generar Javadoc y Desplegar en GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Descargar el código (Checkout)
        uses: actions/checkout@v4

      - name: Configurar Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Generar Javadoc
        working-directory: ./demo
        run: mvn javadoc:javadoc

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir Javadoc como artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "target/site/apidocs" # Ruta por defecto de Javadoc en Maven

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
