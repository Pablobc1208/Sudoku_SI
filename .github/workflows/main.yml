name: CI/CD Sudoku- GitFlow

on:
  # Se ejecuta en cada push a la rama de desarrollo para verificar la integración
  push:
    branches: ["dev", "develop", "main"] # Añadimos "main" aquí
  # Se ejecuta al crear un Pull Request hacia main
  pull_request:
    branches: ["main"]

# Permisos necesarios para desplegar en GitHub Pages y crear Releases
permissions:
  contents: write # Modificado de read a write para poder crear la Release
  pages: write
  id-token: write

jobs:
  build-and-test:
    name: Compilación, Pruebas y Cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código (Checkout)
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Compilar y ejecutar pruebas unitarias (con JaCoCo para cobertura)
        working-directory: ./demo
        run: mvn clean test jacoco:report

      - name: Subir reporte de cobertura como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: reporte-cobertura-jacoco
          path: target/site/jacoco/
          retention-days: 7

  generate-and-deploy-javadoc:
    name: Generar Javadoc y Desplegar en GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Descargar el código (Checkout)
        uses: actions/checkout@v4

      - name: Configurar Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Generar Javadoc
        working-directory: ./demo
        run: mvn javadoc:javadoc

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir Javadoc como artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "demo/target/site/apidocs" # Ruta por defecto de Javadoc en Maven

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  create-release:
    name: Crear Release en GitHub
    runs-on: ubuntu-latest
    needs: [build-and-test] # Espera a que las pruebas pasen
    # Asegura que SOLO se ejecuta cuando se hace merge/push a main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Descargar el código (Checkout)
        uses: actions/checkout@v4

      - name: Crear Release Automática
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          body: |
            **Nueva versión generada automáticamente**
            Esta release se ha creado tras integrar los últimos cambios en la rama `main`.
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}